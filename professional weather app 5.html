<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Weather Intelligence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            max-width: 400px;
            padding: 15px 20px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: #fff;
            outline: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .weather-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .weather-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .weather-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
            opacity: 0;
        }

        .weather-card:hover::before {
            opacity: 1;
            animation: shine 0.8s ease-in-out;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .current-weather {
            text-align: center;
            grid-column: 1 / -1;
        }

        .city-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .weather-icon {
            font-size: 4rem;
            margin: 20px 0;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .temperature {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .description {
            font-size: 1.2rem;
            text-transform: capitalize;
            opacity: 0.9;
            margin-bottom: 15px;
        }

        .feels-like {
            font-size: 1rem;
            opacity: 0.8;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #4ecdc4;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detail-label {
            opacity: 0.8;
        }

        .detail-value {
            font-weight: 600;
        }

        .forecast-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .forecast-day {
            font-weight: 600;
            min-width: 80px;
        }

        .forecast-icon {
            font-size: 1.5rem;
            margin: 0 10px;
        }

        .forecast-temps {
            display: flex;
            gap: 10px;
        }

        .temp-high {
            font-weight: 600;
        }

        .temp-low {
            opacity: 0.7;
        }

        .error {
            background: linear-gradient(45deg, #ff6b6b, #ff5252);
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
        }

        .loader {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .air-quality {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .aqi-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .aqi-good { background: #4caf50; }
        .aqi-moderate { background: #ffeb3b; color: #333; }
        .aqi-unhealthy { background: #ff9800; }
        .aqi-very-unhealthy { background: #f44336; }
        .aqi-hazardous { background: #9c27b0; }

        .chart-container {
            height: 200px;
            margin-top: 20px;
            position: relative;
        }

        .chart-canvas {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .unit-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 5px;
            gap: 5px;
        }

        .unit-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .unit-btn.active {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            font-weight: 600;
        }

        .favorites {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            justify-content: center;
        }

        .favorite-city {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .favorite-city:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .last-updated {
            text-align: center;
            margin-top: 20px;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .search-container {
                flex-direction: column;
                align-items: stretch;
            }

            .search-input {
                max-width: none;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .weather-cards {
                grid-template-columns: 1fr;
            }

            .logo {
                font-size: 2rem;
            }

            .temperature {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Tesla Weather Intelligence</div>
            <div class="tagline">Advanced Weather Analytics & Forecasting</div>
        </div>

        <div class="search-container">
            <input type="text" id="cityInput" class="search-input" placeholder="Enter city name or coordinates...">
            <button id="searchBtn" class="btn">Search</button>
            <button id="locationBtn" class="btn btn-secondary">Use My Location</button>
        </div>

        <div class="controls">
            <div class="unit-toggle">
                <button class="unit-btn active" data-unit="metric">°C</button>
                <button class="unit-btn" data-unit="imperial">°F</button>
                <button class="unit-btn" data-unit="kelvin">K</button>
            </div>
            <button id="refreshBtn" class="btn btn-secondary">Refresh</button>
        </div>

        <div class="favorites" id="favorites"></div>

        <div id="error" class="error" style="display: none;"></div>
        <div id="loading" class="loading" style="display: none;">
            <div class="loader"></div>
            <div>Loading weather data...</div>
        </div>

        <div class="weather-cards" id="weatherCards"></div>

        <div class="last-updated" id="lastUpdated"></div>
    </div>

    <script>
        class TeslaWeatherApp {
            constructor() {
                this.apiKey = 'YOUR_API_KEY_HERE'; // Replace with your OpenWeatherMap API key
                this.currentUnit = 'metric';
                this.currentCity = '';
                this.favorites = JSON.parse(localStorage.getItem('weatherFavorites') || '[]');
                this.weatherCache = {};
                this.init();
            }

            init() {
                this.bindEvents();
                this.renderFavorites();
                this.loadLastCity();
            }

            bindEvents() {
                document.getElementById('searchBtn').addEventListener('click', () => this.searchWeather());
                document.getElementById('locationBtn').addEventListener('click', () => this.getCurrentLocation());
                document.getElementById('refreshBtn').addEventListener('click', () => this.refreshWeather());
                document.getElementById('cityInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.searchWeather();
                });

                document.querySelectorAll('.unit-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => this.changeUnit(e.target.dataset.unit));
                });
            }

            async searchWeather() {
                const city = document.getElementById('cityInput').value.trim();
                if (!city) return;

                this.showLoading();
                this.currentCity = city;
                localStorage.setItem('lastCity', city);

                try {
                    const weatherData = await this.fetchWeatherData(city);
                    this.displayWeather(weatherData);
                    this.addToFavorites(city);
                } catch (error) {
                    this.showError('City not found or API error. Please try again.');
                }
            }

            async fetchWeatherData(city) {
                // For demo purposes, we'll use mock data since we don't have a real API key
                // In production, replace this with actual API calls
                if (this.apiKey === 'YOUR_API_KEY_HERE') {
                    return this.getMockWeatherData(city);
                }

                const currentWeatherUrl = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${this.apiKey}&units=${this.currentUnit}`;
                const forecastUrl = `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${this.apiKey}&units=${this.currentUnit}`;
                const airQualityUrl = `https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=${this.apiKey}`;

                const [currentWeather, forecast] = await Promise.all([
                    fetch(currentWeatherUrl).then(res => res.json()),
                    fetch(forecastUrl).then(res => res.json())
                ]);

                return { current: currentWeather, forecast: forecast };
            }

            getMockWeatherData(city) {
                const weatherConditions = [
                    { icon: '☀️', desc: 'sunny', temp: 25, humidity: 45, wind: 12 },
                    { icon: '⛅', desc: 'partly cloudy', temp: 20, humidity: 60, wind: 8 },
                    { icon: '🌧️', desc: 'rainy', temp: 15, humidity: 85, wind: 15 },
                    { icon: '❄️', desc: 'snowy', temp: -5, humidity: 70, wind: 10 },
                    { icon: '⛈️', desc: 'stormy', temp: 18, humidity: 90, wind: 25 }
                ];

                const condition = weatherConditions[Math.floor(Math.random() * weatherConditions.length)];
                const baseTemp = this.convertTemperature(condition.temp, 'metric', this.currentUnit);
                
                return {
                    current: {
                        name: city,
                        main: {
                            temp: baseTemp,
                            feels_like: baseTemp - 2,
                            humidity: condition.humidity,
                            pressure: 1013,
                            temp_min: baseTemp - 5,
                            temp_max: baseTemp + 5
                        },
                        weather: [{ description: condition.desc, icon: condition.icon }],
                        wind: { speed: condition.wind, deg: 180 },
                        visibility: 10000,
                        sys: { sunrise: 1640766000, sunset: 1640799600 },
                        dt: Date.now() / 1000
                    },
                    forecast: {
                        list: Array.from({ length: 5 }, (_, i) => ({
                            dt: (Date.now() / 1000) + (i * 86400),
                            main: {
                                temp_max: baseTemp + Math.random() * 10 - 5,
                                temp_min: baseTemp + Math.random() * 10 - 10
                            },
                            weather: [{ description: condition.desc, icon: condition.icon }]
                        }))
                    }
                };
            }

            displayWeather(data) {
                const { current, forecast } = data;
                const cardsContainer = document.getElementById('weatherCards');
                
                cardsContainer.innerHTML = `
                    <div class="weather-card current-weather">
                        <div class="city-name">${current.name}</div>
                        <div class="weather-icon">${current.weather[0].icon}</div>
                        <div class="temperature">${Math.round(current.main.temp)}${this.getUnitSymbol()}</div>
                        <div class="description">${current.weather[0].description}</div>
                        <div class="feels-like">Feels like ${Math.round(current.main.feels_like)}${this.getUnitSymbol()}</div>
                    </div>

                    <div class="weather-card">
                        <div class="card-title">Weather Details</div>
                        <div class="detail-item">
                            <span class="detail-label">Humidity</span>
                            <span class="detail-value">${current.main.humidity}%</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Wind Speed</span>
                            <span class="detail-value">${current.wind.speed} ${this.getWindUnit()}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Pressure</span>
                            <span class="detail-value">${current.main.pressure} hPa</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Visibility</span>
                            <span class="detail-value">${(current.visibility / 1000).toFixed(1)} km</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Sunrise</span>
                            <span class="detail-value">${new Date(current.sys.sunrise * 1000).toLocaleTimeString()}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Sunset</span>
                            <span class="detail-value">${new Date(current.sys.sunset * 1000).toLocaleTimeString()}</span>
                        </div>
                    </div>

                    <div class="weather-card">
                        <div class="card-title">Air Quality</div>
                        <div class="air-quality">
                            <span>Air Quality Index</span>
                            <span class="aqi-badge aqi-good">Good</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">PM2.5</span>
                            <span class="detail-value">${Math.round(Math.random() * 20 + 10)} μg/m³</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">PM10</span>
                            <span class="detail-value">${Math.round(Math.random() * 30 + 20)} μg/m³</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">O3</span>
                            <span class="detail-value">${Math.round(Math.random() * 100 + 50)} μg/m³</span>
                        </div>
                    </div>

                    <div class="weather-card">
                        <div class="card-title">5-Day Forecast</div>
                        ${forecast.list.map(item => `
                            <div class="forecast-item">
                                <div class="forecast-day">${new Date(item.dt * 1000).toLocaleDateString('en-US', { weekday: 'short' })}</div>
                                <div class="forecast-icon">${item.weather[0].icon}</div>
                                <div class="forecast-temps">
                                    <span class="temp-high">${Math.round(item.main.temp_max)}°</span>
                                    <span class="temp-low">${Math.round(item.main.temp_min)}°</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="weather-card">
                        <div class="card-title">Temperature Trend</div>
                        <div class="chart-container">
                            <canvas class="chart-canvas" id="tempChart"></canvas>
                        </div>
                    </div>
                `;

                this.drawTemperatureChart(forecast.list);
                this.updateLastUpdated();
                this.hideLoading();
            }

            drawTemperatureChart(forecastData) {
                const canvas = document.getElementById('tempChart');
                const ctx = canvas.getContext('2d');
                const rect = canvas.getBoundingClientRect();
                
                canvas.width = rect.width;
                canvas.height = rect.height;

                const temps = forecastData.map(item => item.main.temp_max);
                const maxTemp = Math.max(...temps);
                const minTemp = Math.min(...temps);
                const range = maxTemp - minTemp;

                ctx.strokeStyle = '#4ecdc4';
                ctx.lineWidth = 3;
                ctx.beginPath();

                temps.forEach((temp, index) => {
                    const x = (index / (temps.length - 1)) * (canvas.width - 40) + 20;
                    const y = canvas.height - 40 - ((temp - minTemp) / range) * (canvas.height - 80);
                    
                    if (index === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }

                    // Draw points
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, 2 * Math.PI);
                    ctx.fill();
                });

                ctx.stroke();
            }

            getCurrentLocation() {
                if (!navigator.geolocation) {
                    this.showError('Geolocation is not supported by this browser.');
                    return;
                }

                this.showLoading();
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const { latitude, longitude } = position.coords;
                        try {
                            const weatherData = await this.fetchWeatherByCoords(latitude, longitude);
                            this.displayWeather(weatherData);
                        } catch (error) {
                            this.showError('Could not fetch weather for your location.');
                        }
                    },
                    () => {
                        this.showError('Could not retrieve your location.');
                        this.hideLoading();
                    }
                );
            }

            async fetchWeatherByCoords(lat, lon) {
                // Mock data for demo - replace with actual API call
                return this.getMockWeatherData(`${lat}, ${lon}`);
            }

            changeUnit(unit) {
                this.currentUnit = unit;
                
                document.querySelectorAll('.unit-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                document.querySelector(`[data-unit="${unit}"]`).classList.add('active');

                if (this.currentCity) {
                    this.searchWeather();
                }
            }

            convertTemperature(temp, fromUnit, toUnit) {
                if (fromUnit === toUnit) return temp;
                
                // Convert to Celsius first
                let celsius = temp;
                if (fromUnit === 'imperial') {
                    celsius = (temp - 32) * 5/9;
                } else if (fromUnit === 'kelvin') {
                    celsius = temp - 273.15;
                }
                
                // Convert from Celsius to target unit
                if (toUnit === 'imperial') {
                    return celsius * 9/5 + 32;
                } else if (toUnit === 'kelvin') {
                    return celsius + 273.15;
                }
                
                return celsius;
            }

            getUnitSymbol() {
                return this.currentUnit === 'metric' ? '°C' : 
                       this.currentUnit === 'imperial' ? '°F' : 'K';
            }

            getWindUnit() {
                return this.currentUnit === 'metric' ? 'm/s' : 'mph';
            }

            addToFavorites(city) {
                if (!this.favorites.includes(city)) {
                    this.favorites.unshift(city);
                    this.favorites = this.favorites.slice(0, 5); // Keep only 5 favorites
                    localStorage.setItem('weatherFavorites', JSON.stringify(this.favorites));
                    this.renderFavorites();
                }
            }

            renderFavorites() {
                const favoritesContainer = document.getElementById('favorites');
                favoritesContainer.innerHTML = this.favorites.map(city => 
                    `<div class="favorite-city" onclick="app.loadFavorite('${city}')">${city}</div>`
                ).join('');
            }

            loadFavorite(city) {
                document.getElementById('cityInput').value = city;
                this.searchWeather();
            }

            loadLastCity() {
                const lastCity = localStorage.getItem('lastCity');
                if (lastCity) {
                    document.getElementById('cityInput').value = lastCity;
                    this.searchWeather();
                }
            }

            refreshWeather() {
                if (this.currentCity) {
                    this.searchWeather();
                }
            }

            showLoading() {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('error').style.display = 'none';
            }

            hideLoading() {
                document.getElementById('loading').style.display = 'none';
            }

            showError(message) {
                document.getElementById('error').textContent = message;
                document.getElementById('error').style.display = 'block';
                this.hideLoading();
            }

            updateLastUpdated() {
                const now = new Date();
                document.getElementById('lastUpdated').textContent = 
                    `Last updated: ${now.toLocaleString()}`;
            }
        }

        // Initialize the application
        const app = new TeslaWeatherApp();
    </script>
</body>
</html>
