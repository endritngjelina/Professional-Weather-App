<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Weather Intelligence Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .tagline {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .theme-toggle {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(180deg);
        }

        .search-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
        }

        .search-input {
            flex: 1;
            max-width: 400px;
            padding: 15px 20px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            max-width: 400px;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            margin-top: 5px;
            display: none;
        }

        .autocomplete-item {
            padding: 10px 15px;
            cursor: pointer;
            color: #333;
            transition: background 0.2s;
        }

        .autocomplete-item:hover {
            background: rgba(255, 255, 255, 0.8);
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: #fff;
            outline: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .weather-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .weather-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .weather-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
            opacity: 0;
        }

        .weather-card:hover::before {
            opacity: 1;
            animation: shine 0.8s ease-in-out;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .current-weather {
            text-align: center;
            grid-column: 1 / -1;
            position: relative;
        }

        .city-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .weather-icon {
            font-size: 4rem;
            margin: 20px 0;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .temperature {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .description {
            font-size: 1.2rem;
            text-transform: capitalize;
            opacity: 0.9;
            margin-bottom: 15px;
        }

        .feels-like {
            font-size: 1rem;
            opacity: 0.8;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #4ecdc4;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detail-label {
            opacity: 0.8;
        }

        .detail-value {
            font-weight: 600;
        }

        .forecast-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .forecast-day {
            font-weight: 600;
            min-width: 80px;
        }

        .forecast-icon {
            font-size: 1.5rem;
            margin: 0 10px;
        }

        .forecast-temps {
            display: flex;
            gap: 10px;
        }

        .temp-high {
            font-weight: 600;
        }

        .temp-low {
            opacity: 0.7;
        }

        .error {
            background: linear-gradient(45deg, #ff6b6b, #ff5252);
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
        }

        .loader {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .air-quality {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .aqi-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .aqi-good { background: #4caf50; }
        .aqi-moderate { background: #ffeb3b; color: #333; }
        .aqi-unhealthy { background: #ff9800; }
        .aqi-very-unhealthy { background: #f44336; }
        .aqi-hazardous { background: #9c27b0; }

        .chart-container {
            height: 200px;
            margin-top: 20px;
            position: relative;
        }

        .chart-canvas {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .unit-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 5px;
            gap: 5px;
        }

        .unit-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .unit-btn.active {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            font-weight: 600;
        }

        .favorites {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            justify-content: center;
        }

        .favorite-city {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            position: relative;
        }

        .favorite-city:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .favorite-city .remove-favorite {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff6b6b;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            display: none;
        }

        .favorite-city:hover .remove-favorite {
            display: block;
        }

        .last-updated {
            text-align: center;
            margin-top: 20px;
            opacity: 0.7;
            font-size: 0.9rem;
        }

        .weather-alerts {
            background: linear-gradient(45deg, #ff9800, #ff5722);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            padding: 15px 20px;
            border-radius: 10px;
            z-index: 1000;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .notification.show {
            transform: translateX(0);
        }

        .comparison-card {
            grid-column: 1 / -1;
        }

        .comparison-cities {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .comparison-city {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .radar-container {
            position: relative;
            height: 300px;
            margin-top: 15px;
        }

        .radar-canvas {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .historical-data {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .historical-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .historical-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .historical-value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .voice-control {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .voice-control:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .voice-control.listening {
            background: #ff6b6b;
            animation: pulse 1s infinite;
        }

        .dark-theme {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .export-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .export-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .weather-map {
            height: 400px;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .map-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .search-container {
                flex-direction: column;
                align-items: stretch;
            }

            .search-input {
                max-width: none;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .weather-cards {
                grid-template-columns: 1fr;
            }

            .logo {
                font-size: 2rem;
            }

            .temperature {
                font-size: 2.5rem;
            }

            .comparison-cities {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="theme-toggle" id="themeToggle">🌙</button>
            <div class="logo">Tesla Weather Intelligence Pro</div>
            <div class="tagline">Advanced Weather Analytics & Forecasting System</div>
        </div>

        <div class="search-container">
            <input type="text" id="cityInput" class="search-input" placeholder="Enter city name, coordinates, or speak your request...">
            <div class="autocomplete-dropdown" id="autocompleteDropdown"></div>
            <button id="searchBtn" class="btn">Search</button>
            <button id="locationBtn" class="btn btn-secondary">My Location</button>
            <button id="voiceBtn" class="voice-control">🎤</button>
        </div>

        <div class="controls">
            <div class="unit-toggle">
                <button class="unit-btn active" data-unit="metric">°C</button>
                <button class="unit-btn" data-unit="imperial">°F</button>
                <button class="unit-btn" data-unit="kelvin">K</button>
            </div>
            <button id="refreshBtn" class="btn btn-secondary">Refresh</button>
            <button id="compareBtn" class="btn btn-secondary">Compare Cities</button>
            <button id="exportBtn" class="export-btn">Export Data</button>
        </div>

        <div class="favorites" id="favorites"></div>

        <div id="weatherAlerts" class="weather-alerts" style="display: none;"></div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="loading" class="loading" style="display: none;">
            <div class="loader"></div>
            <div>Loading weather data...</div>
        </div>

        <div class="weather-cards" id="weatherCards"></div>

        <div class="last-updated" id="lastUpdated"></div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        class TeslaWeatherAppPro {
            constructor() {
                this.apiKey = 'YOUR_API_KEY_HERE';
                this.currentUnit = 'metric';
                this.currentCity = '';
                this.favorites = JSON.parse(localStorage.getItem('weatherFavorites') || '[]');
                this.weatherCache = {};
                this.compareMode = false;
                this.compareCities = [];
                this.isDarkTheme = localStorage.getItem('darkTheme') === 'true';
                this.voiceRecognition = null;
                this.notificationPermission = false;
                this.autoRefreshInterval = null;
                this.historicalData = JSON.parse(localStorage.getItem('historicalData') || {};
                this.init();
            }

            init() {
                this.bindEvents();
                this.initVoiceRecognition();
                this.requestNotificationPermission();
                this.renderFavorites();
                this.loadLastCity();
                this.applyTheme();
                this.startAutoRefresh();
                this.loadCityDatabase();
            }

            bindEvents() {
                document.getElementById('searchBtn').addEventListener('click', () => this.searchWeather());
                document.getElementById('locationBtn').addEventListener('click', () => this.getCurrentLocation());
                document.getElementById('refreshBtn').addEventListener('click', () => this.refreshWeather());
                document.getElementById('compareBtn').addEventListener('click', () => this.toggleCompareMode());
                document.getElementById('exportBtn').addEventListener('click', () => this.exportData());
                document.getElementById('themeToggle').addEventListener('click', () => this.toggleTheme());
                document.getElementById('voiceBtn').addEventListener('click', () => this.toggleVoiceRecognition());
                
                document.getElementById('cityInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.searchWeather();
                });

                document.getElementById('cityInput').addEventListener('input', (e) => {
                    this.handleAutocomplete(e.target.value);
                });

                document.querySelectorAll('.unit-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => this.changeUnit(e.target.dataset.unit));
                });

                // Global keyboard shortcuts
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey || e.metaKey) {
                        switch(e.key) {
                            case 'k':
                                e.preventDefault();
                                document.getElementById('cityInput').focus();
                                break;
                            case 'r':
                                e.preventDefault();
                                this.refreshWeather();
                                break;
                            case 'e':
                                e.preventDefault();
                                this.exportData();
                                break;
                        }
                    }
                });
            }

            initVoiceRecognition() {
                if ('webkitSpeechRecognition' in window) {
                    this.voiceRecognition = new webkitSpeechRecognition();
                    this.voiceRecognition.continuous = false;
                    this.voiceRecognition.interimResults = false;
                    this.voiceRecognition.lang = 'en-US';

                    this.voiceRecognition.onresult = (event) => {
                        const command = event.results[0][0].transcript.toLowerCase();
                        this.processVoiceCommand(command);
                    };

                    this.voiceRecognition.onend = () => {
                        document.getElementById('voiceBtn').classList.remove('listening');
                    };

                    this.voiceRecognition.onerror = (event) => {
                        console.error('Voice recognition error', event.error);
                        document.getElementById('voiceBtn').classList.remove('listening');
                    };
                } else {
                    console.warn('Voice recognition not supported in this browser');
                }
            }

            processVoiceCommand(command) {
                if (command.includes('weather in') || command.includes('weather for')) {
                    const city = command.replace(/weather (in|for) /g, '').trim();
                    document.getElementById('cityInput').value = city;
                    this.searchWeather();
                } else if (command.includes('refresh')) {
                    this.refreshWeather();
                } else if (command.includes('location')) {
                    this.getCurrentLocation();
                } else if (command.includes('celsius')) {
                    this.changeUnit('metric');
                } else if (command.includes('fahrenheit')) {
                    this.changeUnit('imperial');
                } else if (command.includes('kelvin')) {
                    this.changeUnit('kelvin');
                } else {
                    document.getElementById('cityInput').value = command;
                    this.searchWeather();
                }
            }

            toggleVoiceRecognition() {
                if (this.voiceRecognition) {
                    const voiceBtn = document.getElementById('voiceBtn');
                    if (voiceBtn.classList.contains('listening')) {
                        this.voiceRecognition.stop();
                        voiceBtn.classList.remove('listening');
                    } else {
                        this.voiceRecognition.start();
                        voiceBtn.classList.add('listening');
                    }
                } else {
                    this.showError('Voice recognition not supported in your browser');
                }
            }

            requestNotificationPermission() {
                if ('Notification' in window) {
                    Notification.requestPermission().then(permission => {
                        this.notificationPermission = permission === 'granted';
                    });
                }
            }

            showNotification(title, message) {
                if (this.notificationPermission) {
                    new Notification(title, {
                        body: message,
                        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="50%" x="50%" text-anchor="middle" font-size="50">🌤️</text></svg>'
                    });
                }
                
                const notification = document.getElementById('notification');
                notification.textContent = `${title}: ${message}`;
                notification.classList.add('show');
                setTimeout(() => notification.classList.remove('show'), 3000);
            }

            loadCityDatabase() {
                // City database for autocomplete
                this.cityDatabase = [
                    'New York', 'Los Angeles', 'Chicago', 'Houston', 'Phoenix',
                    'Philadelphia', 'San Antonio', 'San Diego', 'Dallas', 'San Jose',
                    'Austin', 'Jacksonville', 'Fort Worth', 'Columbus', 'Charlotte',
                    'San Francisco', 'Indianapolis', 'Seattle', 'Denver', 'Washington',
                    'Boston', 'El Paso', 'Nashville', 'Detroit', 'Oklahoma City',
                    'Portland', 'Las Vegas', 'Memphis', 'Louisville', 'Baltimore',
                    'Milwaukee', 'Albuquerque', 'Tucson', 'Fresno', 'Sacramento',
                    'London', 'Paris', 'Berlin', 'Madrid', 'Rome', 'Amsterdam',
                    'Vienna', 'Prague', 'Barcelona', 'Munich', 'Hamburg', 'Milan',
                    'Tokyo', 'Seoul', 'Beijing', 'Shanghai', 'Mumbai', 'Delhi',
                    'Bangalore', 'Sydney', 'Melbourne', 'Toronto', 'Vancouver'
                ];
            }

            handleAutocomplete(query) {
                const dropdown = document.getElementById('autocompleteDropdown');
                if (!query.trim()) {
                    dropdown.style.display = 'none';
                    return;
                }

                const matches = this.cityDatabase.filter(city => 
                    city.toLowerCase().includes(query.toLowerCase())
                ).slice(0, 5);

                if (matches.length > 0) {
                    dropdown.innerHTML = matches.map(city => 
                        `<div class="autocomplete-item" onclick="app.selectCity('${city}')">${city}</div>`
                    ).join('');
                    dropdown.style.display = 'block';
                } else {
                    dropdown.style.display = 'none';
                }
            }

            selectCity(city) {
                document.getElementById('cityInput').value = city;
                document.getElementById('autocompleteDropdown').style.display = 'none';
                this.searchWeather();
            }

            async searchWeather() {
                const city = document.getElementById('cityInput').value.trim();
                if (!city) return;

                this.showLoading();
                this.currentCity = city;
                localStorage.setItem('lastCity', city);

                try {
                    const weatherData = await this.fetchWeatherData(city);
                    this.displayWeather(weatherData);
                    this.addToFavorites(city);
                    this.storeHistoricalData(city, weatherData);
                    this.checkWeatherAlerts(weatherData);
                } catch (error) {
                    console.error('Error fetching weather:', error);
                    this.showError('City not found or API error. Please try again.');
                }
            }

            checkWeatherAlerts(weatherData) {
                const alerts = [];
                const temp = weatherData.current.main.temp;
                const humidity = weatherData.current.main.humidity;
                const windSpeed = weatherData.current.wind.speed;

                if (temp > 35) alerts.push('🔥 Extreme heat warning');
                if (temp < -10) alerts.push('❄️ Extreme cold warning');
                if (humidity > 90) alerts.push('💧 High humidity alert');
                if (windSpeed > 15) alerts.push('💨 Strong wind warning');

                const alertsContainer = document.getElementById('weatherAlerts');
                if (alerts.length > 0) {
                    alertsContainer.innerHTML = alerts.join(' • ');
                    alertsContainer.style.display = 'block';
                    this.showNotification('Weather Alert', alerts[0]);
                } else {
                    alertsContainer.style.display = 'none';
                }
            }

            storeHistoricalData(city, weatherData) {
                if (!this.historicalData[city]) {
                    this.historicalData[city] = [];
                }
                
                this.historicalData[city].push({
                    date: new Date().toISOString(),
                    temp: weatherData.current.main.temp,
                    humidity: weatherData.current.main.humidity,
                    pressure: weatherData.current.main.pressure
                });

                // Keep only last 30 days
                this.historicalData[city] = this.historicalData[city].slice(-30);
                localStorage.setItem('historicalData', JSON.stringify(this.historicalData));
            }

            async fetchWeatherData(city) {
                // Use mock data if API key is not set
                if (this.apiKey === 'YOUR_API_KEY_HERE') {
                    return this.getMockWeatherData(city);
                }

                try {
                    const currentWeatherUrl = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${this.apiKey}&units=${this.currentUnit}`;
                    const forecastUrl = `https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${this.apiKey}&units=${this.currentUnit}`;

                    const [currentResponse, forecastResponse] = await Promise.all([
                        fetch(currentWeatherUrl),
                        fetch(forecastUrl)
                    ]);

                    if (!currentResponse.ok || !forecastResponse.ok) {
                        throw new Error('API request failed');
                    }

                    const [currentWeather, forecast] = await Promise.all([
                        currentResponse.json(),
                        forecastResponse.json()
                    ]);

                    return { current: currentWeather, forecast };
                } catch (error) {
                    console.error('API error:', error);
                    return this.getMockWeatherData(city);
                }
            }

            getMockWeatherData(city) {
                // Enhanced mock data with more realistic values
                const getRandomValue = (min, max) => (Math.random() * (max - min) + min).toFixed(1);
                const getRandomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
                
                // Weather icons mapping
                const weatherIcons = {
                    'clear': '☀️',
                    'clouds': '☁️',
                    'rain': '🌧️',
                    'thunderstorm': '⛈️',
                    'snow': '❄️',
                    'mist': '🌫️'
                };
                
                // Weather conditions
                const conditions = ['clear', 'clouds', 'rain', 'thunderstorm', 'snow', 'mist'];
                const randomCondition = conditions[Math.floor(Math.random() * conditions.length)];
                
                // Current weather data
                const currentWeather = {
                    name: city,
                    main: {
                        temp: getRandomValue(15, 35),
                        feels_like: getRandomValue(12, 38),
                        humidity: getRandomInt(30, 90),
                        pressure: getRandomInt(990, 1020)
                    },
                    wind: {
                        speed: getRandomValue(1, 20),
                        deg: getRandomInt(0, 360)
                    },
                    weather: [
                        {
                            description: randomCondition,
                            main: randomCondition
                        }
                    ],
                    sys: {
                        country: city === 'London' ? 'GB' : 'US'
                    },
                    dt: Math.floor(Date.now() / 1000)
                };
                
                // Forecast data (5 days)
                const forecast = {
                    list: []
                };
                
                const today = new Date();
                for (let i = 0; i < 5; i++) {
                    const date = new Date(today);
                    date.setDate(today.getDate() + i);
                    
                    for (let j = 0; j < 3; j++) {
                        const forecastCondition = conditions[Math.floor(Math.random() * conditions.length)];
                        
                        forecast.list.push({
                            dt: Math.floor(date.getTime() / 1000) + (j * 8 * 3600),
                            main: {
                                temp: getRandomValue(10, 30),
                                temp_min: getRandomValue(8, 25),
                                temp_max: getRandomValue(15, 35),
                                humidity: getRandomInt(40, 95)
                            },
                            weather: [
                                {
                                    description: forecastCondition,
                                    main: forecastCondition,
                                    icon: weatherIcons[forecastCondition]
                                }
                            ]
                        });
                    }
                }
                
                return {
                    current: currentWeather,
                    forecast
                };
            }

            displayWeather(weatherData) {
                this.hideLoading();
                this.hideError();
                
                const weatherCards = document.getElementById('weatherCards');
                weatherCards.innerHTML = '';
                
                // Render current weather
                const currentWeather = weatherData.current;
                const forecast = weatherData.forecast;
                
                const currentCard = document.createElement('div');
                currentCard.className = 'weather-card current-weather';
                
                const weatherIcon = this.getWeatherIcon(currentWeather.weather[0].main);
                const temp = this.formatTemperature(currentWeather.main.temp);
                
                currentCard.innerHTML = `
                    <div class="city-name">${currentWeather.name}, ${currentWeather.sys.country}</div>
                    <div class="weather-icon">${weatherIcon}</div>
                    <div class="temperature">${temp}</div>
                    <div class="description">${currentWeather.weather[0].description}</div>
                    <div class="feels-like">Feels like: ${this.formatTemperature(currentWeather.main.feels_like)}</div>
                    <div class="last-updated" id="lastUpdated"></div>
                `;
                
                weatherCards.appendChild(currentCard);
                
                // Render weather details
                const detailsCard = document.createElement('div');
                detailsCard.className = 'weather-card';
                detailsCard.innerHTML = `
                    <div class="card-title">Weather Details</div>
                    <div class="detail-item">
                        <span class="detail-label">Humidity</span>
                        <span class="detail-value">${currentWeather.main.humidity}%</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Wind</span>
                        <span class="detail-value">${currentWeather.wind.speed} ${this.getSpeedUnit()}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Pressure</span>
                        <span class="detail-value">${currentWeather.main.pressure} hPa</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Visibility</span>
                        <span class="detail-value">${(currentWeather.visibility / 1000).toFixed(1)} km</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Cloudiness</span>
                        <span class="detail-value">${currentWeather.clouds ? currentWeather.clouds.all + '%' : 'N/A'}</span>
                    </div>
                    <div class="air-quality">
                        <span class="detail-label">Air Quality</span>
                        <span class="aqi-badge aqi-good">Good</span>
                    </div>
                `;
                
                weatherCards.appendChild(detailsCard);
                
                // Render 5-day forecast
                const forecastCard = document.createElement('div');
                forecastCard.className = 'weather-card';
                forecastCard.innerHTML = `
                    <div class="card-title">5-Day Forecast</div>
                    <div id="forecastContainer"></div>
                `;
                
                weatherCards.appendChild(forecastCard);
                this.renderForecast(forecast);
                
                // Render historical data
                if (this.historicalData[currentWeather.name]) {
                    const historicalCard = document.createElement('div');
                    historicalCard.className = 'weather-card';
                    historicalCard.innerHTML = `
                        <div class="card-title">Historical Data</div>
                        <div class="historical-data" id="historicalContainer"></div>
                    `;
                    weatherCards.appendChild(historicalCard);
                    this.renderHistoricalData(currentWeather.name);
                }
                
                // Render weather map
                const mapCard = document.createElement('div');
                mapCard.className = 'weather-card';
                mapCard.innerHTML = `
                    <div class="card-title">Weather Map</div>
                    <div class="weather-map">
                        <div class="map-placeholder">Interactive weather map for ${currentWeather.name}</div>
                    </div>
                `;
                weatherCards.appendChild(mapCard);
                
                // Update last updated time
                const now = new Date();
                document.getElementById('lastUpdated').textContent = `Last updated: ${now.toLocaleTimeString()}`;
            }

            getWeatherIcon(condition) {
                const icons = {
                    'clear': '☀️',
                    'clouds': '☁️',
                    'rain': '🌧️',
                    'thunderstorm': '⛈️',
                    'snow': '❄️',
                    'mist': '🌫️',
                    'drizzle': '🌦️'
                };
                return icons[condition.toLowerCase()] || '🌤️';
            }

            formatTemperature(temp) {
                if (this.currentUnit === 'kelvin') {
                    return `${parseFloat(temp).toFixed(1)} K`;
                }
                return `${parseFloat(temp).toFixed(1)}°${this.currentUnit === 'metric' ? 'C' : 'F'}`;
            }

            getSpeedUnit() {
                return this.currentUnit === 'imperial' ? 'mph' : 'm/s';
            }

            renderForecast(forecastData) {
                const forecastContainer = document.getElementById('forecastContainer');
                forecastContainer.innerHTML = '';
                
                // Group forecast by day
                const dailyForecast = {};
                forecastData.list.forEach(item => {
                    const date = new Date(item.dt * 1000);
                    const day = date.toLocaleDateString('en-US', { weekday: 'short' });
                    
                    if (!dailyForecast[day]) {
                        dailyForecast[day] = {
                            min: Number.MAX_VALUE,
                            max: Number.MIN_VALUE,
                            icon: item.weather[0].icon,
                            condition: item.weather[0].main
                        };
                    }
                    
                    if (item.main.temp_min < dailyForecast[day].min) {
                        dailyForecast[day].min = item.main.temp_min;
                    }
                    
                    if (item.main.temp_max > dailyForecast[day].max) {
                        dailyForecast[day].max = item.main.temp_max;
                    }
                });
                
                // Render forecast items
                Object.keys(dailyForecast).forEach(day => {
                    const forecastItem = document.createElement('div');
                    forecastItem.className = 'forecast-item';
                    
                    forecastItem.innerHTML = `
                        <div class="forecast-day">${day}</div>
                        <div class="forecast-icon">${this.getWeatherIcon(dailyForecast[day].condition)}</div>
                        <div class="forecast-temps">
                            <span class="temp-high">${this.formatTemperature(dailyForecast[day].max)}</span>
                            <span class="temp-low">${this.formatTemperature(dailyForecast[day].min)}</span>
                        </div>
                    `;
                    
                    forecastContainer.appendChild(forecastItem);
                });
            }

            renderHistoricalData(city) {
                const historicalData = this.historicalData[city];
                if (!historicalData || historicalData.length === 0) return;
                
                const historicalContainer = document.getElementById('historicalContainer');
                historicalContainer.innerHTML = '';
                
                // Get last 5 historical entries
                const recentData = historicalData.slice(-5);
                
                recentData.forEach(data => {
                    const date = new Date(data.date);
                    const formattedDate = date.toLocaleDateString('en-US', { 
                        month: 'short', 
                        day: 'numeric' 
                    });
                    
                    const item = document.createElement('div');
                    item.className = 'historical-item';
                    item.innerHTML = `
                        <div class="historical-label">${formattedDate}</div>
                        <div class="historical-value">${this.formatTemperature(data.temp)}</div>
                        <div class="historical-label">Humidity: ${data.humidity}%</div>
                    `;
                    
                    historicalContainer.appendChild(item);
                });
            }

            renderFavorites() {
                const favoritesContainer = document.getElementById('favorites');
                if (!favoritesContainer) return;
                
                if (this.favorites.length === 0) {
                    favoritesContainer.innerHTML = '<p>No favorite cities yet. Search for a city and add it to favorites.</p>';
                    return;
                }
                
                favoritesContainer.innerHTML = '';
                this.favorites.forEach(city => {
                    const cityElement = document.createElement('div');
                    cityElement.className = 'favorite-city';
                    cityElement.innerHTML = `
                        ${city}
                        <button class="remove-favorite" onclick="app.removeFavorite('${city}')">×</button>
                    `;
                    cityElement.addEventListener('click', () => {
                        document.getElementById('cityInput').value = city;
                        this.searchWeather();
                    });
                    
                    favoritesContainer.appendChild(cityElement);
                });
            }

            addToFavorites(city) {
                if (!this.favorites.includes(city)) {
                    this.favorites.push(city);
                    localStorage.setItem('weatherFavorites', JSON.stringify(this.favorites));
                    this.renderFavorites();
                    this.showNotification('Favorite Added', `${city} added to favorites`);
                }
            }

            removeFavorite(city) {
                this.favorites = this.favorites.filter(fav => fav !== city);
                localStorage.setItem('weatherFavorites', JSON.stringify(this.favorites));
                this.renderFavorites();
                this.showNotification('Favorite Removed', `${city} removed from favorites`);
            }

            toggleCompareMode() {
                this.compareMode = !this.compareMode;
                this.showNotification('Compare Mode', this.compareMode ? 
                    'Compare mode enabled. Add cities to compare.' : 
                    'Compare mode disabled');
            }

            exportData() {
                const data = {
                    city: this.currentCity,
                    unit: this.currentUnit,
                    timestamp: new Date().toISOString(),
                    favorites: this.favorites
                };
                
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = `weather_data_${new Date().toISOString().slice(0, 10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                this.showNotification('Data Exported', 'Weather data exported successfully');
            }

            changeUnit(unit) {
                if (this.currentUnit === unit) return;
                
                this.currentUnit = unit;
                localStorage.setItem('weatherUnit', unit);
                
                // Update UI
                document.querySelectorAll('.unit-btn').forEach(btn => {
                    if (btn.dataset.unit === unit) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
                
                if (this.currentCity) {
                    this.refreshWeather();
                }
                
                this.showNotification('Unit Changed', `Switched to ${unit.toUpperCase()} units`);
            }

            getCurrentLocation() {
                if (!navigator.geolocation) {
                    this.showError('Geolocation is not supported by your browser');
                    return;
                }
                
                this.showLoading();
                
                navigator.geolocation.getCurrentPosition(
                    position => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        document.getElementById('cityInput').value = `${lat},${lon}`;
                        this.searchWeather();
                    },
                    error => {
                        this.hideLoading();
                        this.showError('Unable to retrieve your location');
                    }
                );
            }

            toggleTheme() {
                this.isDarkTheme = !this.isDarkTheme;
                localStorage.setItem('darkTheme', this.isDarkTheme);
                this.applyTheme();
                this.showNotification('Theme Changed', `Switched to ${this.isDarkTheme ? 'dark' : 'light'} theme`);
            }

            applyTheme() {
                if (this.isDarkTheme) {
                    document.body.classList.add('dark-theme');
                    document.getElementById('themeToggle').textContent = '☀️';
                } else {
                    document.body.classList.remove('dark-theme');
                    document.getElementById('themeToggle').textContent = '🌙';
                }
            }

            refreshWeather() {
                if (this.currentCity) {
                    this.searchWeather();
                }
            }

            loadLastCity() {
                const lastCity = localStorage.getItem('lastCity');
                if (lastCity) {
                    document.getElementById('cityInput').value = lastCity;
                    this.searchWeather();
                }
            }

            startAutoRefresh() {
                // Refresh every 15 minutes
                this.autoRefreshInterval = setInterval(() => {
                    if (this.currentCity) {
                        this.refreshWeather();
                        this.showNotification('Auto Refresh', 'Weather data updated');
                    }
                }, 15 * 60 * 1000);
            }

            showLoading() {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('weatherCards').style.display = 'none';
                this.hideError();
            }

            hideLoading() {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('weatherCards').style.display = 'grid';
            }

            showError(message) {
                document.getElementById('error').textContent = message;
                document.getElementById('error').style.display = 'block';
                this.hideLoading();
            }

            hideError() {
                document.getElementById('error').style.display = 'none';
            }
        }

        // Initialize the app
        const app = new TeslaWeatherAppPro();
    </script>
</body>
</html>
