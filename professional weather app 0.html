<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherPro - Advanced Weather Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 1s ease-out;
        }

        .header h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .search-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        .search-input {
            padding: 15px 20px;
            border: none;
            border-radius: 25px;
            width: 300px;
            font-size: 16px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            placeholder-color: rgba(255, 255, 255, 0.7);
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.02);
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .location-btn {
            background: rgba(52, 152, 219, 0.8);
            border: 2px solid rgba(52, 152, 219, 0.3);
        }

        .location-btn:hover {
            background: rgba(52, 152, 219, 1);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.3);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #2196F3;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
            color: white;
            animation: fadeInUp 1s ease-out 0.6s both;
            transition: all 0.3s ease;
        }

        .weather-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .weather-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        .temperature {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .description {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-transform: capitalize;
        }

        .city-name {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .detail-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            color: white;
            transition: all 0.3s ease;
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        .detail-card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.15);
        }

        .detail-icon {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .detail-label {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 18px;
            font-weight: 600;
        }

        .forecast-container {
            margin-top: 30px;
            animation: fadeInUp 1s ease-out 1s both;
        }

        .forecast-title {
            text-align: center;
            color: white;
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .forecast-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            color: white;
            transition: all 0.3s ease;
        }

        .forecast-card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.15);
        }

        .forecast-day {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .forecast-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .forecast-temp {
            font-size: 16px;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            margin: 50px 0;
        }

        .error {
            background: rgba(231, 76, 60, 0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            animation: shake 0.5s ease-in-out;
        }

        .hidden {
            display: none;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #fff;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @media (max-width: 768px) {
            .search-input {
                width: 250px;
            }
            
            .temperature {
                font-size: 3rem;
            }
            
            .city-name {
                font-size: 1.5rem;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>WeatherPro</h1>
            <p style="color: rgba(255,255,255,0.8); font-size: 1.1rem;">Professional Weather Intelligence Platform</p>
        </div>

        <div class="search-container">
            <input type="text" class="search-input" id="cityInput" placeholder="Enter city name..." onkeypress="handleEnterKey(event)">
            <button class="btn" onclick="searchWeather()">🔍 Search</button>
            <button class="btn location-btn" onclick="getCurrentLocation()">📍 My Location</button>
        </div>

        <div class="controls">
            <div style="display: flex; align-items: center; gap: 10px; color: white;">
                <span>°C</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="unitToggle" onchange="toggleUnit()">
                    <span class="slider"></span>
                </label>
                <span>°F</span>
            </div>
            <button class="btn" onclick="refreshWeather()">🔄 Refresh</button>
        </div>

        <div id="errorMessage" class="error hidden"></div>
        <div id="loadingMessage" class="loading hidden">
            <div class="loading-spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <div id="weatherCard" class="weather-card hidden">
            <div class="weather-icon" id="weatherIcon"></div>
            <div class="temperature" id="temperature"></div>
            <div class="description" id="description"></div>
            <div class="city-name" id="cityName"></div>
            
            <div class="details-grid">
                <div class="detail-card">
                    <div class="detail-icon">💧</div>
                    <div class="detail-label">Humidity</div>
                    <div class="detail-value" id="humidity"></div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon">💨</div>
                    <div class="detail-label">Wind Speed</div>
                    <div class="detail-value" id="windSpeed"></div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon">👁️</div>
                    <div class="detail-label">Visibility</div>
                    <div class="detail-value" id="visibility"></div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon">🌡️</div>
                    <div class="detail-label">Feels Like</div>
                    <div class="detail-value" id="feelsLike"></div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon">📊</div>
                    <div class="detail-label">Pressure</div>
                    <div class="detail-value" id="pressure"></div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon">🌅</div>
                    <div class="detail-label">UV Index</div>
                    <div class="detail-value" id="uvIndex"></div>
                </div>
            </div>
        </div>

        <div id="forecastContainer" class="forecast-container hidden">
            <h2 class="forecast-title">5-Day Forecast</h2>
            <div class="forecast-grid" id="forecastGrid"></div>
        </div>
    </div>

    <script>
        // Configuration
        const API_KEY = 'YOUR_API_KEY_HERE'; // Replace with your OpenWeatherMap API key
        const BASE_URL = 'https://api.openweathermap.org/data/2.5';
        
        // State management
        let currentWeatherData = null;
        let isMetric = true;
        let currentCity = '';

        // Weather icon mapping
        const weatherIcons = {
            '01d': '☀️', '01n': '🌙',
            '02d': '⛅', '02n': '☁️',
            '03d': '☁️', '03n': '☁️',
            '04d': '☁️', '04n': '☁️',
            '09d': '🌧️', '09n': '🌧️',
            '10d': '🌦️', '10n': '🌧️',
            '11d': '⛈️', '11n': '⛈️',
            '13d': '❄️', '13n': '❄️',
            '50d': '🌫️', '50n': '🌫️'
        };

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            // Check if user has a saved city
            const savedCity = localStorage.getItem('lastCity');
            if (savedCity) {
                document.getElementById('cityInput').value = savedCity;
                searchWeather();
            }
            
            // Check saved unit preference
            const savedUnit = localStorage.getItem('temperatureUnit');
            if (savedUnit === 'imperial') {
                document.getElementById('unitToggle').checked = true;
                isMetric = false;
            }
        });

        // Search functionality
        function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                showError('Please enter a city name');
                return;
            }
            
            currentCity = city;
            localStorage.setItem('lastCity', city);
            fetchWeatherData(city);
        }

        function handleEnterKey(event) {
            if (event.key === 'Enter') {
                searchWeather();
            }
        }

        // Geolocation functionality
        function getCurrentLocation() {
            if (!navigator.geolocation) {
                showError('Geolocation is not supported by this browser');
                return;
            }

            showLoading();
            navigator.geolocation.getCurrentPosition(
                position => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    fetchWeatherByCoords(lat, lon);
                },
                error => {
                    hideLoading();
                    showError('Unable to retrieve your location. Please try again.');
                }
            );
        }

        // API calls
        async function fetchWeatherData(city) {
            showLoading();
            
            try {
                const units = isMetric ? 'metric' : 'imperial';
                const response = await fetch(`${BASE_URL}/weather?q=${city}&appid=${API_KEY}&units=${units}`);
                
                if (!response.ok) {
                    throw new Error('City not found');
                }
                
                const data = await response.json();
                currentWeatherData = data;
                displayWeatherData(data);
                
                // Fetch forecast data
                fetchForecastData(city);
                
            } catch (error) {
                hideLoading();
                showError('Unable to fetch weather data. Please check the city name and try again.');
            }
        }

        async function fetchWeatherByCoords(lat, lon) {
            try {
                const units = isMetric ? 'metric' : 'imperial';
                const response = await fetch(`${BASE_URL}/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=${units}`);
                
                if (!response.ok) {
                    throw new Error('Weather data not available');
                }
                
                const data = await response.json();
                currentWeatherData = data;
                currentCity = data.name;
                document.getElementById('cityInput').value = currentCity;
                localStorage.setItem('lastCity', currentCity);
                displayWeatherData(data);
                
                // Fetch forecast data
                fetchForecastByCoords(lat, lon);
                
            } catch (error) {
                hideLoading();
                showError('Unable to fetch weather data for your location.');
            }
        }

        async function fetchForecastData(city) {
            try {
                const units = isMetric ? 'metric' : 'imperial';
                const response = await fetch(`${BASE_URL}/forecast?q=${city}&appid=${API_KEY}&units=${units}`);
                
                if (!response.ok) {
                    throw new Error('Forecast data not available');
                }
                
                const data = await response.json();
                displayForecastData(data);
                
            } catch (error) {
                console.error('Error fetching forecast data:', error);
            }
        }

        async function fetchForecastByCoords(lat, lon) {
            try {
                const units = isMetric ? 'metric' : 'imperial';
                const response = await fetch(`${BASE_URL}/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=${units}`);
                
                if (!response.ok) {
                    throw new Error('Forecast data not available');
                }
                
                const data = await response.json();
                displayForecastData(data);
                
            } catch (error) {
                console.error('Error fetching forecast data:', error);
            }
        }

        // Display functions
        function displayWeatherData(data) {
            hideLoading();
            hideError();
            
            const unitSymbol = isMetric ? '°C' : '°F';
            const speedUnit = isMetric ? 'm/s' : 'mph';
            
            document.getElementById('weatherIcon').textContent = weatherIcons[data.weather[0].icon] || '🌤️';
            document.getElementById('temperature').textContent = `${Math.round(data.main.temp)}${unitSymbol}`;
            document.getElementById('description').textContent = data.weather[0].description;
            document.getElementById('cityName').textContent = `${data.name}, ${data.sys.country}`;
            
            document.getElementById('humidity').textContent = `${data.main.humidity}%`;
            document.getElementById('windSpeed').textContent = `${data.wind.speed} ${speedUnit}`;
            document.getElementById('visibility').textContent = `${(data.visibility / 1000).toFixed(1)} km`;
            document.getElementById('feelsLike').textContent = `${Math.round(data.main.feels_like)}${unitSymbol}`;
            document.getElementById('pressure').textContent = `${data.main.pressure} hPa`;
            document.getElementById('uvIndex').textContent = 'N/A'; // OpenWeatherMap doesn't provide UV index in free tier
            
            document.getElementById('weatherCard').classList.remove('hidden');
        }

        function displayForecastData(data) {
            const forecastGrid = document.getElementById('forecastGrid');
            forecastGrid.innerHTML = '';
            
            // Group forecast data by day (take one forecast per day)
            const dailyForecasts = {};
            data.list.forEach(forecast => {
                const date = new Date(forecast.dt * 1000);
                const dayKey = date.toDateString();
                
                if (!dailyForecasts[dayKey]) {
                    dailyForecasts[dayKey] = forecast;
                }
            });
            
            // Display up to 5 days
            const forecasts = Object.values(dailyForecasts).slice(0, 5);
            const unitSymbol = isMetric ? '°C' : '°F';
            
            forecasts.forEach(forecast => {
                const date = new Date(forecast.dt * 1000);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const icon = weatherIcons[forecast.weather[0].icon] || '🌤️';
                
                const forecastCard = document.createElement('div');
                forecastCard.className = 'forecast-card';
                forecastCard.innerHTML = `
                    <div class="forecast-day">${dayName}</div>
                    <div class="forecast-icon">${icon}</div>
                    <div class="forecast-temp">${Math.round(forecast.main.temp)}${unitSymbol}</div>
                    <div style="font-size: 12px; opacity: 0.8; margin-top: 5px;">${forecast.weather[0].description}</div>
                `;
                
                forecastGrid.appendChild(forecastCard);
            });
            
            document.getElementById('forecastContainer').classList.remove('hidden');
        }

        // Unit toggle functionality
        function toggleUnit() {
            const toggle = document.getElementById('unitToggle');
            isMetric = !toggle.checked;
            localStorage.setItem('temperatureUnit', isMetric ? 'metric' : 'imperial');
            
            if (currentWeatherData) {
                fetchWeatherData(currentCity);
            }
        }

        // Refresh functionality
        function refreshWeather() {
            if (currentCity) {
                fetchWeatherData(currentCity);
            } else {
                showError('No city selected to refresh');
            }
        }

        // Utility functions
        function showLoading() {
            document.getElementById('loadingMessage').classList.remove('hidden');
            document.getElementById('weatherCard').classList.add('hidden');
            document.getElementById('forecastContainer').classList.add('hidden');
        }

        function hideLoading() {
            document.getElementById('loadingMessage').classList.add('hidden');
        }

        function showError(message) {
            const errorElement = document.getElementById('errorMessage');
            errorElement.textContent = message;
            errorElement.classList.remove('hidden');
            setTimeout(() => {
                errorElement.classList.add('hidden');
            }, 5000);
        }

        function hideError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }

        // Demo mode for testing without API key
        function enableDemoMode() {
            if (API_KEY === 'YOUR_API_KEY_HERE') {
                const demoData = {
                    name: 'San Francisco',
                    sys: { country: 'US' },
                    main: {
                        temp: 22,
                        feels_like: 24,
                        humidity: 65,
                        pressure: 1013
                    },
                    weather: [{
                        description: 'partly cloudy',
                        icon: '02d'
                    }],
                    wind: { speed: 3.5 },
                    visibility: 10000
                };
                
                setTimeout(() => {
                    displayWeatherData(demoData);
                    
                    // Demo forecast data
                    const demoForecast = {
                        list: [
                            { dt: Date.now()/1000, main: { temp: 22 }, weather: [{ description: 'sunny', icon: '01d' }] },
                            { dt: Date.now()/1000 + 86400, main: { temp: 25 }, weather: [{ description: 'cloudy', icon: '03d' }] },
                            { dt: Date.now()/1000 + 172800, main: { temp: 20 }, weather: [{ description: 'rainy', icon: '09d' }] },
                            { dt: Date.now()/1000 + 259200, main: { temp: 18 }, weather: [{ description: 'stormy', icon: '11d' }] },
                            { dt: Date.now()/1000 + 345600, main: { temp: 23 }, weather: [{ description: 'clear', icon: '01d' }] }
                        ]
                    };
                    displayForecastData(demoForecast);
                }, 1000);
            }
        }

        // Auto-enable demo mode if no API key is provided
        if (API_KEY === 'YOUR_API_KEY_HERE') {
            console.log('Demo mode enabled - using sample data');
            document.getElementById('cityInput').value = 'San Francisco';
            setTimeout(() => {
                showLoading();
                enableDemoMode();
            }, 500);
        }
    </script>
</body>
</html>
